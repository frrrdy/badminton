<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Badminton</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

:root {
  --bg:       #0a0a0f;
  --surface:  #13131a;
  --surface2: #1c1c27;
  --border:   #2a2a3a;
  --accent:   #c8ff00;
  --accent2:  #ff6b35;
  --text:     #e8e8f0;
  --muted:    #6a6a8a;
  --danger:   #ff4444;
  --pause-c:  #ff9500;
  --ok:       #00e676;
  --radius:   14px;
  --mono:     'DM Mono', monospace;
  --display:  'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  padding: 14px 13px 70px;
  max-width: 560px;
  margin: 0 auto;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding: 0 2px;
}
.logo { font-family: var(--display); font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
.logo span { color: var(--text); opacity: 0.5; }
.date-pill {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 12px;
  font-size: 11px; color: var(--text);
}
.date-pill input[type=date] {
  background: none; border: none; color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none; cursor: pointer;
}

/* ── COLLAPSIBLE CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.card-header-left { display: flex; align-items: center; gap: 10px; }
.card-title {
  font-family: var(--display); font-size: 14px; font-weight: 700;
  color: var(--text); letter-spacing: 0.5px;
}
.card-badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 9px; font-size: 10px; color: var(--muted);
}
.card-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
.card.open .card-chevron { transform: rotate(180deg); }
.card-body { padding: 0 16px 16px; display: none; }
.card.open .card-body { display: block; }
.card.always-open .card-body { display: block; }
.card.always-open .card-header { cursor: default; }

/* ── PLAYERS ── */
.player-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 7px;
  margin-bottom: 10px;
}
.player-tile {
  position: relative; padding: 10px 6px 8px; border-radius: 10px;
  text-align: center; cursor: pointer; transition: all 0.12s;
  border: 1.5px solid transparent; user-select: none; background: var(--surface2);
}
.player-tile .p-name { font-size: 12px; font-weight: 500; display: block; color: var(--text); }
.player-tile .p-stats { font-size: 9px; color: var(--muted); margin-top: 3px; display: block; }
.player-tile.active   { border-color: var(--accent); background: rgba(200,255,0,0.07); }
.player-tile.active .p-name { color: var(--accent); }
.player-tile.pausing  { border-color: var(--pause-c); background: rgba(255,149,0,0.08); }
.player-tile.pausing .p-name { color: var(--pause-c); }
.player-tile.inactive .p-name { color: var(--muted); }
.player-tile .remove-btn {
  position: absolute; top: 3px; right: 4px; background: none; border: none;
  color: var(--muted); font-size: 12px; cursor: pointer; padding: 0; line-height: 1; opacity: 0.3;
}
.player-tile:hover .remove-btn { opacity: 0.7; }
.tile-hint { font-size: 10px; color: var(--muted); margin-top: 6px; }

.add-row { display: flex; gap: 8px; margin-bottom: 12px; }
.add-row input {
  flex: 1; padding: 10px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--mono); font-size: 14px; outline: none;
}
.add-row input::placeholder { color: var(--muted); }

/* ── COURTS ── */
.court-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.court-label { font-size: 12px; color: var(--muted); min-width: 52px; }
.toggle-group { display: flex; gap: 4px; }
.toggle-btn {
  padding: 6px 11px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.12s;
}
.toggle-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

.score-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 12px; color: var(--muted); }
.switch { position: relative; width: 38px; height: 21px; display: inline-block; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 21px; cursor: pointer; transition: .2s; }
.slider:before { content:''; position:absolute; width:15px; height:15px; left:2px; top:2px; background:var(--muted); border-radius:50%; transition:.2s; }
input:checked + .slider { background: var(--accent); border-color: var(--accent); }
input:checked + .slider:before { transform: translateX(17px); background: #000; }

/* ── DRAW BUTTON ── */
.btn-draw {
  width: 100%; padding: 15px; background: var(--accent); color: #000;
  border: none; border-radius: var(--radius); font-family: var(--display);
  font-size: 17px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s; margin-top: 2px; margin-bottom: 10px;
}
.btn-draw:active { transform: scale(0.97); opacity: 0.85; }

/* ── ACTIVE ROUND ── */
.active-round { display: none; }
.active-round.visible { display: block; }

.match-block {
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; border-left: 3px solid var(--accent);
}
.match-type-tag { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.teams { font-size: 14px; line-height: 1.6; }
.team-a { color: var(--text); }
.vs-sep { color: var(--muted); margin: 0 6px; font-size: 11px; }
.team-b { color: var(--text); }

.pause-tag {
  background: rgba(255,149,0,0.1); border: 1px solid var(--pause-c);
  border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--pause-c); margin-bottom: 8px;
}

.winner-section { margin-top: 10px; }
.winner-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.winner-btns { display: flex; gap: 6px; }
.w-btn {
  flex: 1; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); font-family: var(--mono);
  font-size: 11px; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3;
}
.w-btn.selected-a { border-color: var(--ok); color: var(--ok); background: rgba(0,230,118,0.1); }
.w-btn.selected-b { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.1); }

.phase-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-primary { flex: 2; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: var(--display); font-weight: 800; font-size: 15px; cursor: pointer; }
.btn-secondary { flex: 1; padding: 13px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; font-family: var(--mono); font-size: 13px; cursor: pointer; }
.btn-full { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: var(--display); font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 12px; }

/* ── MANUAL ── */
.man-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
.man-section { margin-bottom: 14px; }
.man-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
.man-tile {
  padding: 8px 6px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 12px;
  text-align: center; cursor: pointer; transition: all 0.12s; user-select: none; position: relative;
}
.man-tile.sel-a { border-color: var(--accent); color: var(--accent); background: rgba(200,255,0,0.08); }
.man-tile.sel-b { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.08); }
.man-tile .pause-dot { position:absolute; top:3px; right:4px; width:6px; height:6px; border-radius:50%; background:var(--pause-c); }
.man-tile.pausing-hint { opacity: 0.55; }
.man-legend { display: flex; gap: 12px; margin-bottom: 8px; font-size: 10px; color: var(--muted); }
.man-legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-a { background: var(--accent); }
.dot-b { background: var(--accent2); }

/* ── HISTORY ── */
.history-round {
  background: var(--surface2); border-radius: 10px; padding: 11px 13px;
  margin-bottom: 7px; border-left: 3px solid var(--border);
}
.rnd-header { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.rnd-match { font-size: 12px; margin-bottom: 2px; line-height: 1.5; color: var(--text); }
.rnd-pause { font-size: 11px; color: var(--pause-c); margin-top: 4px; }
.winner-tag { color: var(--ok); font-size: 10px; margin-left: 5px; }
.delete-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 14px; padding: 0; transition: color 0.15s; }
.delete-btn:hover { color: var(--muted); }
.history-actions { display: flex; gap: 8px; margin-top: 10px; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
.stat-name { font-size: 12px; color: var(--text); margin-bottom: 3px; }
.stat-val { font-size: 10px; color: var(--muted); line-height: 1.7; }

/* ── UTILITY ── */
.btn-sm { padding: 9px 14px; border-radius: 9px; border: none; font-family: var(--mono); font-weight: 500; cursor: pointer; font-size: 12px; }
.btn-accent { background: var(--accent); color: #000; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.footer-reset { width: 100%; padding: 9px; background: none; border: 1px solid rgba(255,68,68,0.2); border-radius: 10px; color: rgba(255,68,68,0.45); font-family: var(--mono); font-size: 11px; cursor: pointer; margin-top: 14px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.hidden { display: none !important; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 9px 20px; border-radius: 20px; font-family: var(--display); font-weight: 700; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">BADMINTON<span>.</span></div>
  <div class="date-pill"><input type="date" id="docDate"></div>
</div>

<!-- ACTIVE ROUND -->
<div class="active-round" id="activeRoundSection">
  <div class="card always-open" style="border-color: rgba(200,255,0,0.3);">
    <div class="card-header" style="cursor:default;">
      <div class="card-header-left">
        <div class="card-title" style="color:var(--accent);">Aktuelle Runde</div>
        <div class="card-badge" id="roundBadge">Vorschau</div>
      </div>
    </div>
    <div class="card-body">
      <div id="activePause"></div>
      <div id="activeMatches"></div>
      <div id="phaseA" class="phase-row">
        <button class="btn-secondary" id="btnRedraw">↺ Neu losen</button>
        <button class="btn-primary"   id="btnConfirm">✓ Bestätigen</button>
      </div>
      <div id="phaseB" class="hidden">
        <hr class="divider">
        <div id="winnerSelections"></div>
        <button class="btn-full" id="btnNextRound">→ Nächste Runde</button>
      </div>
    </div>
  </div>
</div>

<!-- DRAW -->
<div id="drawSection">
  <button class="btn-draw" id="btnDraw">⬡ RUNDE AUSLOSEN</button>
</div>

<!-- PLAYERS (collapsible) -->
<div class="card" id="cardPlayers">
  <div class="card-header" onclick="toggleCard('cardPlayers')">
    <div class="card-header-left">
      <div class="card-title">Spieler</div>
      <div class="card-badge" id="activeCount">0 aktiv</div>
    </div>
    <div class="card-chevron">▾</div>
  </div>
  <div class="card-body">
    <div class="add-row">
      <input type="text" id="playerName" placeholder="Name hinzufügen…" autocomplete="off" autocorrect="off">
      <button class="btn-sm btn-accent" id="btnAdd">+</button>
    </div>
    <div class="player-grid" id="playerGrid"></div>
    <p class="tile-hint">Tippen: Aktiv → Pflichtpause → Inaktiv</p>
  </div>
</div>

<!-- COURTS (collapsible) -->
<div class="card" id="cardCourts">
  <div class="card-header" onclick="toggleCard('cardCourts')">
    <div class="card-header-left">
      <div class="card-title">Plätze & Einstellungen</div>
    </div>
    <div class="card-chevron">▾</div>
  </div>
  <div class="card-body">
    <div id="courtRows"></div>
    <div class="score-row">
      <label class="switch"><input type="checkbox" id="scoreToggle"><span class="slider"></span></label>
      <span>Ergebnisse erfassen</span>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="card always-open">
  <div class="card-header" style="cursor:default;">
    <div class="card-header-left">
      <div class="card-title">Verlauf</div>
      <div class="card-badge" id="historyBadge">0 Runden</div>
    </div>
  </div>
  <div class="card-body">
    <div id="historyList"></div>
    <div class="history-actions">
      <button class="btn-sm btn-ghost" id="btnManualAdd" style="flex:1;">+ Manuell nachtragen</button>
      <button class="btn-sm btn-ghost" id="btnStats"     style="flex:1;">↗ Statistik</button>
    </div>
    <button class="footer-reset" id="btnReset">Alle Daten zurücksetzen</button>
  </div>
</div>

<!-- MANUAL ENTRY -->
<div class="card always-open hidden" id="manualCard">
  <div class="card-header" style="cursor:default;">
    <div class="card-header-left"><div class="card-title">Manuell nachtragen</div></div>
  </div>
  <div class="card-body">
    <div class="man-section">
      <div class="man-label">Spieltyp</div>
      <div class="toggle-group" id="manualTypeGroup">
        <button class="toggle-btn selected" data-val="Doppel">Doppel</button>
        <button class="toggle-btn" data-val="Einzel">Einzel</button>
      </div>
    </div>
    <div class="man-section">
      <!-- Dynamic matchup label, always visible -->
      <div id="manDoubleLabel" style="font-size:13px; color:var(--text); margin-bottom:10px; font-family:var(--mono); min-height:20px;">
        Team A <span style="color:var(--muted)">vs</span> Team B
      </div>
      <!-- Doppel grid -->
      <div id="manualDoubleSec">
        <div class="man-legend">
          <span><span class="dot dot-a"></span>Team A</span>
          <span><span class="dot dot-b"></span>Team B</span>
        </div>
        <div class="man-player-grid" id="manualGrid"></div>
        <p style="font-size:10px;color:var(--muted);margin-top:8px;">Erst 2× Team A, dann 2× Team B. ● = pausiert gerade.</p>
      </div>
      <!-- Einzel grid -->
      <div class="hidden" id="manualSingleSec">
        <div class="man-player-grid" id="manualGridSingle"></div>
      </div>
    </div>
    <div class="man-section hidden" id="manualWinnerSec">
      <div class="man-label">Gewinner</div>
      <div class="toggle-group" id="manualWinGroup">
        <button class="toggle-btn" data-val="A">Team A</button>
        <button class="toggle-btn" data-val="B">Team B</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn-sm btn-ghost"  id="btnManualCancel">Abbrechen</button>
      <button class="btn-sm btn-accent" id="btnManualSave">Speichern</button>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="card always-open hidden" id="statsCard">
  <div class="card-header" style="cursor:default;">
    <div class="card-header-left"><div class="card-title">Statistik</div></div>
  </div>
  <div class="card-body">
    <div class="stats-grid" id="statsGrid"></div>
    <button class="btn-sm btn-ghost" style="width:100%;margin-top:10px;" id="btnStatsClose">Schließen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'badminton_v2';
const CORE = ['Bastian','Florian','Lars','Ferdinand','Lukas','Charlotte','Klaus','Simon'];

let S = { players:[], history:[], partnerOf:{}, opponentOf:{}, scoreMode:false, draftId:0, currentDraft:null, phase:'draw' };
const courts = [
  { label:'Platz 1', mode:'Doppel' },
  { label:'Platz 2', mode:'Doppel' },
  { label:'Platz 3', mode:'Aus' },
];

// ── STORAGE ──────────────────────────────────
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ S, courts })); }
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { initDefault(); return; }
  try {
    const p = JSON.parse(raw);
    S = p.S;
    if (p.courts) courts.forEach((c,i) => { if (p.courts[i]) c.mode = p.courts[i].mode; });
  } catch(e) { initDefault(); return; }
  // migrate
  S.players.forEach(p => {
    p.gamesPlayed = p.gamesPlayed || 0;
    p.pauseCount  = p.pauseCount  || 0;
    if (p.lastPlayed  === undefined) p.lastPlayed  = -1;
    if (p.forcePause  === undefined) p.forcePause  = false;
  });
  S.partnerOf  = S.partnerOf  || {};
  S.opponentOf = S.opponentOf || {};
  S.phase      = S.phase      || 'draw';
}
function initDefault() {
  S = { players: CORE.map(n=>newPlayer(n,true)), history:[], partnerOf:{}, opponentOf:{}, scoreMode:false, draftId:0, currentDraft:null, phase:'draw' };
  save();
}
function newPlayer(name, isCore=false) {
  return { name, isCore, active:true, forcePause:false, gamesPlayed:0, pauseCount:0, lastPlayed:-1 };
}

// ── CARD TOGGLE ───────────────────────────────
function toggleCard(id) { document.getElementById(id).classList.toggle('open'); }

// ── INTERACTIONS ─────────────────────────────
function ikey(a,b) { return [a,b].sort().join('|'); }
function getPartner(a,b)  { return S.partnerOf[ikey(a,b)]  || 0; }
function getOpponent(a,b) { return S.opponentOf[ikey(a,b)] || 0; }
function recordMatch(m) {
  if (m.type === 'Doppel') {
    const [a,b,c,d] = m.players;
    [ikey(a,b), ikey(c,d)].forEach(k => S.partnerOf[k]  = (S.partnerOf[k] ||0)+1);
    [[a,c],[a,d],[b,c],[b,d]].forEach(([x,y]) => { const k=ikey(x,y); S.opponentOf[k]=(S.opponentOf[k]||0)+1; });
  } else {
    const k = ikey(m.players[0], m.players[1]); S.opponentOf[k] = (S.opponentOf[k]||0)+1;
  }
}

// ── DRAW ALGORITHM ───────────────────────────
function drawMatches() {
  const pool   = S.players.filter(p => p.active && !p.forcePause);
  const forced = S.players.filter(p => p.active && p.forcePause).map(p => p.name);
  const sizes  = courts.map(c => c.mode==='Doppel'?4 : c.mode==='Einzel'?2 : 0);
  const total  = sizes.reduce((a,b)=>a+b, 0);

  if (total === 0)          { toast('Keine aktiven Plätze konfiguriert.'); return null; }
  if (pool.length < total)  { toast(`Zu wenig Spieler! Brauche ${total}, verfügbar: ${pool.length}.`); return null; }

  const sorted = [...pool].sort((a,b) => {
    if (b.pauseCount !== a.pauseCount) return b.pauseCount - a.pauseCount;
    if (a.lastPlayed !== b.lastPlayed) return a.lastPlayed - b.lastPlayed;
    return Math.random() - 0.5;
  });

  const playing = sorted.slice(0, total);
  const pausing = [...sorted.slice(total).map(p=>p.name), ...forced];
  const matches = [];
  let left = [...playing];

  courts.forEach((court, idx) => {
    const sz = sizes[idx];
    if (!sz) return;
    if (sz === 2) {
      const p1 = left.shift();
      left.sort((a,b) => getOpponent(p1.name,a.name) - getOpponent(p1.name,b.name));
      const p2 = left.shift();
      matches.push({ type:'Einzel', court:idx+1, players:[p1.name,p2.name], winner:null });
    } else {
      const four = left.splice(0,4);
      const best = bestSplit(four.map(p=>p.name));
      matches.push({ type:'Doppel', court:idx+1, players:best, winner:null });
    }
  });
  return { matches, pausing };
}

function bestSplit(n) {
  const splits = [[0,1,2,3],[0,2,1,3],[0,3,1,2]];
  let best=Infinity, bestOrder=splits[0];
  splits.forEach(([a,b,c,d]) => {
    const p = getPartner(n[a],n[b]) + getPartner(n[c],n[d]);
    const o = getOpponent(n[a],n[c]) + getOpponent(n[a],n[d]) + getOpponent(n[b],n[c]) + getOpponent(n[b],n[d]);
    const s = o*3 + p;
    if (s < best) { best=s; bestOrder=[a,b,c,d]; }
  });
  return bestOrder.map(i=>n[i]);
}

// ── PHASE FLOW ───────────────────────────────
function startDraw() {
  const draft = drawMatches();
  if (!draft) return;
  S.currentDraft = draft;
  S.phase = 'confirm';
  save(); renderPhase();
  document.getElementById('activeRoundSection').scrollIntoView({ behavior:'smooth', block:'start' });
}

function onConfirm() {
  const d = S.currentDraft;
  S.draftId++;
  d.pausing.forEach(name => { const p=S.players.find(x=>x.name===name); if(p) p.pauseCount++; });
  d.matches.forEach(m => {
    m.players.forEach(name => { const p=S.players.find(x=>x.name===name); if(p){p.gamesPlayed++;p.lastPlayed=S.draftId;} });
    recordMatch(m);
  });
  S.players.forEach(p => p.forcePause=false);

  const date = document.getElementById('docDate').value;
  let day = S.history.find(h=>h.date===date);
  if (!day) { day={date,rounds:[]}; S.history.push(day); }
  day.rounds.push(JSON.parse(JSON.stringify(d)));

  S.phase = S.scoreMode ? 'result' : 'done';
  if (S.phase === 'done') { finishRound(); return; }
  save(); renderPhase(); renderHistory(); renderPlayers();
}

function onNextRound() {
  if (S.scoreMode && S.currentDraft) {
    const date = document.getElementById('docDate').value;
    const day  = S.history.find(h=>h.date===date);
    if (day && day.rounds.length) {
      const last = day.rounds[day.rounds.length-1];
      last.matches.forEach((m,i) => { if(S.currentDraft.matches[i]) m.winner=S.currentDraft.matches[i].winner; });
    }
  }
  finishRound();
}

function finishRound() {
  S.currentDraft = null; S.phase = 'draw';
  save(); renderPhase(); renderHistory(); renderPlayers();
  toast('Runde gespeichert ✓');
}

function renderPhase() {
  const isActive = S.phase==='confirm' || S.phase==='result';
  document.getElementById('activeRoundSection').classList.toggle('visible', isActive);
  document.getElementById('drawSection').classList.toggle('hidden', isActive);
  if (!isActive || !S.currentDraft) return;

  const d = S.currentDraft;
  document.getElementById('roundBadge').textContent = S.phase==='result' ? 'Läuft' : 'Vorschau';

  document.getElementById('activePause').innerHTML = d.pausing.length
    ? `<div class="pause-tag">⏸ Pause: ${d.pausing.join(', ')}</div>` : '';

  document.getElementById('activeMatches').innerHTML = d.matches.map(m => {
    const t = m.type==='Doppel'
      ? `<span class="team-a">${m.players[0]} / ${m.players[1]}</span><span class="vs-sep">vs</span><span class="team-b">${m.players[2]} / ${m.players[3]}</span>`
      : `<span class="team-a">${m.players[0]}</span><span class="vs-sep">vs</span><span class="team-b">${m.players[1]}</span>`;
    return `<div class="match-block"><div class="match-type-tag">${m.type}</div><div class="teams">${t}</div></div>`;
  }).join('');

  const phA = document.getElementById('phaseA');
  const phB = document.getElementById('phaseB');
  if (S.phase === 'confirm') { phA.classList.remove('hidden'); phB.classList.add('hidden'); }
  else {
    phA.classList.add('hidden'); phB.classList.remove('hidden');
    document.getElementById('winnerSelections').innerHTML = S.scoreMode
      ? d.matches.map((m,mi) => {
          const la = m.type==='Doppel' ? `${m.players[0]} / ${m.players[1]}` : m.players[0];
          const lb = m.type==='Doppel' ? `${m.players[2]} / ${m.players[3]}` : m.players[1];
          return `<div style="margin-bottom:10px;">
            <div class="winner-label">${m.type} — Gewinner</div>
            <div class="winner-btns">
              <button class="w-btn${m.winner==='A'?' selected-a':''}" onclick="setWinner(${mi},'A')">${la} ✓</button>
              <button class="w-btn${m.winner==='B'?' selected-b':''}" onclick="setWinner(${mi},'B')">${lb} ✓</button>
            </div></div>`;
        }).join('') : '';
  }
}

function setWinner(mi, side) {
  S.currentDraft.matches[mi].winner = side;
  document.querySelectorAll('#winnerSelections .winner-btns')[mi]
    ?.querySelectorAll('.w-btn').forEach((b,bi) => {
      b.className = 'w-btn';
      if (bi===0 && side==='A') b.classList.add('selected-a');
      if (bi===1 && side==='B') b.classList.add('selected-b');
    });
}

// ── PLAYERS ──────────────────────────────────
function cycleStatus(i) {
  const p = S.players[i];
  if (p.active && !p.forcePause)     { p.forcePause=true; }
  else if (p.active && p.forcePause) { p.active=false; p.forcePause=false; }
  else                               { p.active=true; }
  renderPlayers(); save();
}
function removePlayer(e,i) {
  e.stopPropagation();
  if(confirm('Spieler löschen?')){ S.players.splice(i,1); renderPlayers(); save(); }
}
function addPlayer() {
  const inp = document.getElementById('playerName');
  const name = inp.value.trim();
  if (!name) return;
  if (S.players.find(p=>p.name.toLowerCase()===name.toLowerCase())) { toast('Name bereits vorhanden'); return; }
  S.players.push(newPlayer(name)); inp.value=''; renderPlayers(); save();
}
function renderPlayers() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  let cnt = 0;
  S.players.forEach((p,i) => {
    if (p.active && !p.forcePause) cnt++;
    const cls = p.active ? (p.forcePause?'pausing':'active') : 'inactive';
    const div = document.createElement('div');
    div.className = `player-tile ${cls}`;
    div.onclick = () => cycleStatus(i);
    div.innerHTML = `${!p.isCore?`<button class="remove-btn" onclick="removePlayer(event,${i})">×</button>`:''}
      <span class="p-name">${p.name}</span>
      <span class="p-stats">⏸ ${p.pauseCount} · 🏸 ${p.gamesPlayed}</span>`;
    grid.appendChild(div);
  });
  document.getElementById('activeCount').textContent = `${cnt} aktiv`;
}

// ── COURTS ───────────────────────────────────
function renderCourts() {
  const wrap = document.getElementById('courtRows');
  wrap.innerHTML = '';
  courts.forEach((c,ci) => {
    const row = document.createElement('div');
    row.className = 'court-row';
    row.innerHTML = `<span class="court-label">${c.label}</span><div class="toggle-group">
      ${['Doppel','Einzel','Aus'].map(o=>`<button class="toggle-btn${c.mode===o?' selected':''}" data-ci="${ci}" data-val="${o}">${o}</button>`).join('')}
    </div>`;
    wrap.appendChild(row);
  });
  wrap.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => { courts[+btn.dataset.ci].mode=btn.dataset.val; renderCourts(); save(); };
  });
}

// ── MANUAL ENTRY ─────────────────────────────
let manSel = { A:[], B:[] };
let manType = 'Doppel';
let manWinner = null;

function openManual() {
  manSel={A:[],B:[]}; manType='Doppel'; manWinner=null;
  document.getElementById('manualCard').classList.remove('hidden');
  document.getElementById('manualTypeGroup').querySelectorAll('.toggle-btn')
    .forEach(b=>b.classList.toggle('selected', b.dataset.val==='Doppel'));
  document.getElementById('manualDoubleSec').classList.remove('hidden');
  document.getElementById('manualSingleSec').classList.add('hidden');
  document.getElementById('manualWinnerSec').classList.toggle('hidden', !S.scoreMode);
  renderManualGrids();
  document.getElementById('manualCard').scrollIntoView({behavior:'smooth'});
}

function renderManualGrids() {
  const pausingNow = S.currentDraft ? S.currentDraft.pausing : [];
  const allActive  = S.players.filter(p => p.active);

  if (manType === 'Doppel') {
    const aFull = manSel.A.length >= 2;
    const bFull = manSel.B.length >= 2;

    // Build dynamic label: show names if selected, else placeholder
    const labelA = manSel.A.length === 0 ? 'Team A'
      : manSel.A.length === 1 ? manSel.A[0]
      : `${manSel.A[0]} / ${manSel.A[1]}`;
    const labelB = manSel.B.length === 0 ? 'Team B'
      : manSel.B.length === 1 ? manSel.B[0]
      : `${manSel.B[0]} / ${manSel.B[1]}`;

    const phase = !aFull ? 'a' : !bFull ? 'b' : 'done';
    document.getElementById('manDoubleLabel').innerHTML =
      phase === 'a' ? `<span style="color:var(--accent)">${labelA}</span> <span style="color:var(--muted)">vs</span> ${labelB} — wähle Team A`
    : phase === 'b' ? `<span style="color:var(--accent)">${labelA}</span> <span style="color:var(--muted)">vs</span> <span style="color:var(--accent2)">${labelB}</span> — wähle Team B`
    :                 `<span style="color:var(--accent)">${labelA}</span> <span style="color:var(--muted)">vs</span> <span style="color:var(--accent2)">${labelB}</span>`;

    const grid = document.getElementById('manualGrid');
    grid.innerHTML = '';
    allActive.forEach(p => {
      const isA = manSel.A.includes(p.name), isB = manSel.B.includes(p.name);
      const isPausing = pausingNow.includes(p.name);
      const div = document.createElement('div');
      div.className = 'man-tile' + (isA?' sel-a':isB?' sel-b':'');
      div.innerHTML = p.name + (isPausing ? '<span class="pause-dot"></span>' : '');
      div.onclick = () => toggleManPlayer(p.name);
      grid.appendChild(div);
    });
  } else {
    const grid = document.getElementById('manualGridSingle');
    grid.innerHTML = '';
    const labelA = manSel.A.length === 0 ? '?' : manSel.A[0];
    const labelB = manSel.A.length < 2  ? '?' : manSel.A[1];
    document.getElementById('manDoubleLabel').innerHTML =
      `<span style="color:var(--accent)">${labelA}</span> <span style="color:var(--muted)">vs</span> <span style="color:var(--accent2)">${labelB}</span>`;
    allActive.forEach(p => {
      const isSel = manSel.A.includes(p.name);
      const div = document.createElement('div');
      div.className = 'man-tile' + (isSel ? (manSel.A.indexOf(p.name)===0?' sel-a':' sel-b') : '');
      div.textContent = p.name;
      div.onclick = () => {
        if (isSel) manSel.A=manSel.A.filter(n=>n!==p.name);
        else if (manSel.A.length<2) manSel.A.push(p.name);
        renderManualGrids();
      };
      grid.appendChild(div);
    });
  }
}

function toggleManPlayer(name) {
  if (manSel.A.includes(name))      { manSel.A=manSel.A.filter(n=>n!==name); }
  else if (manSel.B.includes(name)) { manSel.B=manSel.B.filter(n=>n!==name); }
  else if (manSel.A.length < 2)     { manSel.A.push(name); }
  else if (manSel.B.length < 2)     { manSel.B.push(name); }
  else { toast('Bereits 4 Spieler ausgewählt'); return; }
  renderManualGrids();
}

function saveManual() {
  if (manType==='Doppel' && (manSel.A.length!==2||manSel.B.length!==2))
    { toast('Bitte je 2 Spieler für Team A und B wählen'); return; }
  if (manType==='Einzel' && manSel.A.length!==2)
    { toast('Bitte genau 2 Spieler wählen'); return; }

  const players = manType==='Doppel' ? [...manSel.A,...manSel.B] : [...manSel.A];
  const m = { type:manType, players, winner:manWinner, court:null };

  S.draftId++;
  players.forEach(name => { const p=S.players.find(x=>x.name===name); if(p){p.gamesPlayed++;p.lastPlayed=S.draftId;} });
  recordMatch(m);

  const date = document.getElementById('docDate').value;
  let day = S.history.find(h=>h.date===date);
  if (!day) { day={date,rounds:[]}; S.history.push(day); }
  day.rounds.push({ matches:[JSON.parse(JSON.stringify(m))], pausing:[] });

  document.getElementById('manualCard').classList.add('hidden');
  renderPlayers(); renderHistory(); save();
  toast('Manuell eingetragen ✓');
}

// ── HISTORY ──────────────────────────────────
function renderHistory() {
  const date = document.getElementById('docDate').value;
  const day  = S.history.find(h=>h.date===date);
  const list = document.getElementById('historyList');
  const rounds = day ? day.rounds : [];
  document.getElementById('historyBadge').textContent = `${rounds.length} Runde${rounds.length!==1?'n':''}`;

  if (!rounds.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:6px 0 2px;">Noch keine Runden heute.</p>';
    return;
  }
  list.innerHTML = [...rounds].reverse().map((r,ri) => {
    const rndNum = rounds.length - ri;
    const matchLines = r.matches.map(m => {
      let txt = m.type==='Doppel'
        ? `${m.players[0]}/${m.players[1]} vs ${m.players[2]}/${m.players[3]}`
        : `${m.players[0]} vs ${m.players[1]}`;
      if (m.winner==='A') txt += ` <span class="winner-tag">🏆 ${m.type==='Doppel'?m.players[0]+'/'+m.players[1]:m.players[0]}</span>`;
      if (m.winner==='B') txt += ` <span class="winner-tag">🏆 ${m.type==='Doppel'?m.players[2]+'/'+m.players[3]:m.players[1]}</span>`;
      return `<div class="rnd-match">${txt}</div>`;
    }).join('');
    const pauseLine = r.pausing?.length ? `<div class="rnd-pause">⏸ ${r.pausing.join(', ')}</div>` : '';
    const realIdx = rounds.length-1-ri;
    return `<div class="history-round">
      <div class="rnd-header"><span>Runde ${rndNum}</span><button class="delete-btn" onclick="deleteRound('${date}',${realIdx})">🗑</button></div>
      ${matchLines}${pauseLine}
    </div>`;
  }).join('');
}

function deleteRound(date, idx) {
  if (!confirm('Runde löschen?')) return;
  const day = S.history.find(h=>h.date===date);
  if (!day) return;
  const r = day.rounds[idx];
  r.pausing?.forEach(name=>{ const p=S.players.find(x=>x.name===name); if(p&&p.pauseCount>0)p.pauseCount--; });
  r.matches.forEach(m=>{ m.players.forEach(name=>{ const p=S.players.find(x=>x.name===name); if(p&&p.gamesPlayed>0)p.gamesPlayed--; }); });
  day.rounds.splice(idx,1);
  if (!day.rounds.length) S.history=S.history.filter(h=>h.date!==date);
  renderPlayers(); renderHistory(); save(); toast('Runde gelöscht');
}

// ── STATS ────────────────────────────────────
function showStats() {
  const sc = document.getElementById('statsCard');
  sc.classList.remove('hidden');

  // Compute wins per player from all history
  const wins = {}; // name → { total, einzel, doppel }
  S.history.forEach(day => {
    day.rounds.forEach(r => {
      r.matches.forEach(m => {
        if (!m.winner) return;
        const winners = m.winner === 'A' ? m.players.slice(0,2) : m.players.slice(2);
        const isEinzel = m.type === 'Einzel';
        const winList = isEinzel ? [m.winner==='A'?m.players[0]:m.players[1]] : winners;
        winList.forEach(name => {
          if (!wins[name]) wins[name] = { total:0, einzel:0, doppel:0 };
          wins[name].total++;
          if (isEinzel) wins[name].einzel++; else wins[name].doppel++;
        });
      });
    });
  });

  const hasWins = Object.keys(wins).length > 0;

  document.getElementById('statsGrid').innerHTML =
    S.players.filter(p=>p.active).map(p => {
      const w = wins[p.name] || { total:0, einzel:0, doppel:0 };
      const winsLine = hasWins
        ? `🏆 ${w.total} Siege (E: ${w.einzel} · D: ${w.doppel})<br>` : '';
      return `<div class="stat-item">
        <div class="stat-name">${p.name}</div>
        <div class="stat-val">🏸 ${p.gamesPlayed} Spiele<br>${winsLine}⏸ ${p.pauseCount} Pausen</div>
      </div>`;
    }).join('');

  sc.scrollIntoView({behavior:'smooth'});
}

// ── TOAST ────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── INIT ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('docDate').valueAsDate = new Date();
  document.getElementById('scoreToggle').checked = S.scoreMode;

  renderCourts(); renderPlayers(); renderHistory(); renderPhase();

  document.getElementById('btnAdd').onclick    = addPlayer;
  document.getElementById('playerName').addEventListener('keydown', e=>{ if(e.key==='Enter')addPlayer(); });
  document.getElementById('btnDraw').onclick   = startDraw;
  document.getElementById('btnRedraw').onclick = startDraw;
  document.getElementById('btnConfirm').onclick  = onConfirm;
  document.getElementById('btnNextRound').onclick = onNextRound;
  document.getElementById('docDate').onchange  = renderHistory;

  document.getElementById('scoreToggle').onchange = function() {
    S.scoreMode = this.checked; save();
    document.getElementById('manualWinnerSec').classList.toggle('hidden', !S.scoreMode);
  };

  document.getElementById('btnManualAdd').onclick    = openManual;
  document.getElementById('btnManualCancel').onclick = ()=>document.getElementById('manualCard').classList.add('hidden');
  document.getElementById('btnManualSave').onclick   = saveManual;

  document.getElementById('manualTypeGroup').querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.onclick = ()=>{
      manType=btn.dataset.val; manSel={A:[],B:[]};
      document.getElementById('manualTypeGroup').querySelectorAll('.toggle-btn')
        .forEach(b=>b.classList.toggle('selected',b.dataset.val===manType));
      document.getElementById('manualDoubleSec').classList.toggle('hidden', manType!=='Doppel');
      document.getElementById('manualSingleSec').classList.toggle('hidden', manType==='Doppel');
      renderManualGrids();
    };
  });

  document.getElementById('manualWinGroup').querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.onclick = ()=>{
      manWinner=btn.dataset.val;
      document.getElementById('manualWinGroup').querySelectorAll('.toggle-btn')
        .forEach(b=>b.classList.toggle('selected',b.dataset.val===manWinner));
    };
  });

  document.getElementById('btnStats').onclick      = showStats;
  document.getElementById('btnStatsClose').onclick = ()=>document.getElementById('statsCard').classList.add('hidden');
  document.getElementById('btnReset').onclick      = ()=>{
    if(confirm('Wirklich alle Daten löschen?')){ localStorage.removeItem(STORAGE_KEY); location.reload(); }
  };
});
</script>
