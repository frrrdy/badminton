<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Badminton Auslosung Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --inactive: #94a3b8;
        }

        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('IMG_2648.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 40px; 
        }

        .container { max-width: 600px; margin: 0 auto; }
        
        .card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 18px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2, h3 { margin-top: 0; color: #0f172a; }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .player-tile {
            position: relative;
            padding: 12px 8px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            min-height: 80px;
            justify-content: center;
            user-select: none;
        }

        .player-tile.active { background-color: #dbeafe; border-color: var(--primary); color: var(--primary); }
        .player-tile.inactive { background-color: #f1f5f9; color: var(--inactive); border-color: #e2e8f0; }
        .player-tile.must-pause { background-color: #ffedd5; border-color: var(--warning); color: var(--warning); }

        .player-tile .pause-count { font-size: 11px; margin-top: 4px; opacity: 0.8; }
        
        @keyframes shuffle {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); }
        }
        .shuffling { animation: shuffle 0.2s ease-in-out 3; }

        .flex-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        input[type="text"], select { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; background: white; }
        
        button { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-add { background: var(--text); color: white; }
        .btn-accept { background: var(--success); color: white; flex: 1; }
        .btn-reject { background: var(--inactive); color: white; flex: 1; }

        .match-display { 
            background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; 
            border-left: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 14px;
        }
        
        .pause-box { background: #fef2f2; color: var(--danger); padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
        .history-entry { background: #f8fafc; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; font-size: 13px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: white; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 25px;">🏸 Badminton Auslosung</h2>

    <div class="card">
        <h3>Spieler (<span id="activeCount">0</span>)</h3>
        <p style="font-size: 11px; margin-top: -10px; color: #64748b;">Tippen: Status (Aktiv ➜ Pause ➜ Aus) wechseln</p>
        <div class="flex-row">
            <input type="text" id="playerName" placeholder="Name...">
            <button class="btn-add" id="btnAddPlayer">Add</button>
        </div>
        <div id="playerGrid" class="player-grid"></div>
    </div>

    <div class="card">
        <h3>Plätze</h3>
        <div class="flex-row"><span>Platz 1</span><select id="c1"><option value="4">Doppel (4)</option><option value="2">Einzel (2)</option><option value="0">Aus</option></select></div>
        <div class="flex-row"><span>Platz 2</span><select id="c2"><option value="4">Doppel (4)</option><option value="2">Einzel (2)</option><option value="0">Aus</option></select></div>
        <div class="flex-row"><span>Platz 3</span><select id="c3"><option value="0">Aus</option><option value="4">Doppel (4)</option><option value="2">Einzel (2)</option></select></div>
        <button class="btn-primary" id="btnDraw">Runde auslosen 🎲</button>
    </div>

    <div id="previewArea" class="card hidden">
        <h3 style="color: var(--primary)">Vorschau</h3>
        <div id="matchPreview"></div>
        <div id="pausePreview" class="pause-box"></div>
        <div class="flex-row" style="margin-top:20px;">
            <button class="btn-reject" id="btnReject">Neu losen</button>
            <button class="btn-accept" id="btnAccept">Bestätigen</button>
        </div>
    </div>

    <div class="card">
        <div class="flex-row"><h3 style="margin:0; flex:1;">Historie</h3><input type="date" id="docDate" style="max-width: 140px;"></div>
        <div id="historyList"></div>
        <button onclick="fullReset()" style="background:none; color:var(--danger); border:1px solid var(--danger); width:100%; margin-top:20px; padding:8px; border-radius:8px; font-size:11px;">Alles zurücksetzen</button>
    </div>
</div>

<script>
    const CORE_PLAYERS = ["Bastian", "Florian", "Lars", "Ferdinand", "Lukas", "Charlotte", "Klaus", "Simon"];
    let state = { players: [], history: [], currentDraft: null, interactions: {} };

    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('badmintonState_v8');
        if (saved) state = JSON.parse(saved);
        else resetToDefaults();
        
        document.getElementById('docDate').valueAsDate = new Date();
        renderPlayers();
        renderHistory();
        
        document.getElementById('btnAddPlayer').onclick = addPlayer;
        document.getElementById('btnDraw').onclick = triggerShuffle;
        document.getElementById('btnAccept').onclick = acceptDraw;
        document.getElementById('btnReject').onclick = triggerShuffle;
        document.getElementById('docDate').onchange = renderHistory;
    });

    function save() { localStorage.setItem('badmintonState_v8', JSON.stringify(state)); }

    function resetToDefaults() {
        state.players = CORE_PLAYERS.map(name => ({ name, active: true, mustPause: false, pauses: 0, isCore: true }));
        state.history = [];
        state.interactions = {};
        save();
        renderPlayers();
    }

    function addPlayer() {
        const input = document.getElementById('playerName');
        const name = input.value.trim();
        if (name) {
            state.players.push({ name, active: true, mustPause: false, pauses: 0, isCore: false });
            input.value = '';
            renderPlayers();
            save();
        }
    }

    function cycleStatus(index) {
        const p = state.players[index];
        if (p.active && !p.mustPause) {
            p.mustPause = true;
        } else if (p.mustPause) {
            p.mustPause = false;
            p.active = false;
        } else {
            p.active = true;
            p.mustPause = false;
        }
        renderPlayers();
        save();
    }

    function removePlayer(e, index) {
        e.stopPropagation();
        if(confirm('Spieler löschen?')) {
            state.players.splice(index, 1);
            renderPlayers();
            save();
        }
    }

    function renderPlayers() {
        const grid = document.getElementById('playerGrid');
        grid.innerHTML = '';
        let activeCounter = 0;

        state.players.forEach((p, i) => {
            if(p.active && !p.mustPause) activeCounter++;
            const div = document.createElement('div');
            let statusClass = p.active ? 'active' : 'inactive';
            if (p.mustPause) statusClass = 'must-pause';
            
            div.className = `player-tile ${statusClass}`;
            div.onclick = () => cycleStatus(i);
            div.innerHTML = `
                ${!p.isCore ? `<button onclick="removePlayer(event, ${i})" style="position:absolute; top:2px; right:2px; background:none; border:none; color:var(--danger); font-size:16px;">×</button>` : ''}
                <span>${p.name}</span>
                <span class="pause-count">Pausen: ${p.pauses}</span>
            `;
            grid.appendChild(div);
        });
        document.getElementById('activeCount').innerText = activeCounter;
    }

    function triggerShuffle() {
        const area = document.getElementById('previewArea');
        area.classList.add('shuffling');
        setTimeout(() => {
            area.classList.remove('shuffling');
            drawMatches();
        }, 400);
    }

    function getWeight(p1, p2) {
        const key = [p1, p2].sort().join('|');
        return state.interactions[key] || 0;
    }

    function drawMatches() {
        const poolAvailable = state.players.filter(p => p.active && !p.mustPause);
        const courts = [
            parseInt(document.getElementById('c1').value),
            parseInt(document.getElementById('c2').value),
            parseInt(document.getElementById('c3').value)
        ];
        const totalNeeded = courts.reduce((a, b) => a + b, 0);

        if (poolAvailable.length < totalNeeded) {
            alert(`Zu wenig Spieler! Benötigt: ${totalNeeded}, Verfügbar: ${poolAvailable.length}.`);
            return;
        }

        let sorted = [...poolAvailable].sort((a, b) => (b.pauses - a.pauses) || (Math.random() - 0.5));
        let selected = sorted.slice(0, totalNeeded);
        
        // WICHTIG: Hier fassen wir geloste Pausen UND erzwungene Pausen zusammen
        let pausingNames = [
            ...sorted.slice(totalNeeded).map(p => p.name), 
            ...state.players.filter(p => p.active && p.mustPause).map(p => p.name)
        ];

        let matches = [];
        let left = [...selected];

        courts.forEach((size, idx) => {
            if (size === 0) return;
            let team = [];
            if (size === 4) {
                let p1 = left.shift();
                left.sort((a, b) => getWeight(p1.name, a.name) - getWeight(p1.name, b.name));
                let p2 = left.shift();
                let p3 = left.shift();
                let p4 = left.shift();
                team = [p1.name, p2.name, p3.name, p4.name];
            } else {
                team = left.splice(0, size).map(p => p.name);
            }
            matches.push({ type: size === 4 ? 'Doppel' : 'Einzel', court: idx + 1, p: team });
        });

        state.currentDraft = { matches, pausing: pausingNames };
        showPreview();
    }

    function formatMatch(m) {
        if (m.type === 'Doppel') return `${m.p[0]}/${m.p[1]} vs ${m.p[2]}/${m.p[3]}`;
        return `${m.p[0]} vs ${m.p[1]}`;
    }

    function showPreview() {
        const area = document.getElementById('previewArea');
        area.classList.remove('hidden');
        area.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('matchPreview').innerHTML = state.currentDraft.matches.map(m => `
            <div class="match-display">
                <b>Pl. ${m.court} (${m.type}):</b> ${formatMatch(m)}
            </div>
        `).join('');
        document.getElementById('pausePreview').innerHTML = state.currentDraft.pausing.length ? `Pause: ${state.currentDraft.pausing.join(', ')}` : 'Keine Pause';
    }

    function acceptDraw() {
        // Hier werden jetzt ALLE gezählt, die pausiert haben
        state.currentDraft.pausing.forEach(name => {
            const p = state.players.find(sp => sp.name === name);
            if (p) p.pauses++;
        });

        state.currentDraft.matches.forEach(m => {
            if (m.type === 'Doppel') {
                const k1 = [m.p[0], m.p[1]].sort().join('|');
                const k2 = [m.p[2], m.p[3]].sort().join('|');
                state.interactions[k1] = (state.interactions[k1] || 0) + 1;
                state.interactions[k2] = (state.interactions[k2] || 0) + 1;
            }
        });

        state.players.forEach(p => p.mustPause = false);

        const date = document.getElementById('docDate').value;
        let day = state.history.find(h => h.date === date);
        if (!day) { day = { date, rounds: [] }; state.history.push(day); }
        day.rounds.push(state.currentDraft);

        state.currentDraft = null;
        document.getElementById('previewArea').classList.add('hidden');
        renderPlayers();
        renderHistory();
        save();
    }

    function renderHistory() {
        const date = document.getElementById('docDate').value;
        const list = document.getElementById('historyList');
        const day = state.history.find(h => h.date === date);
        
        if (!day || !day.rounds.length) {
            list.innerHTML = '<p style="color:gray;text-align:center">Noch keine Runden.</p>';
            return;
        }

        list.innerHTML = [...day.rounds].reverse().map((r, i) => `
            <div class="history-entry">
                <b style="color:var(--primary)">Runde ${day.rounds.length - i}</b><br>
                ${r.matches.map(m => `Pl. ${m.court}: ${formatMatch(m)}`).join('<br>')}
                ${r.pausing.length ? `<div style="color:red; font-size:11px; margin-top:4px;">Pause: ${r.pausing.join(', ')}</div>` : ''}
            </div>
        `).join('');
    }

    function fullReset() {
        if(confirm('Wirklich alle Daten löschen?')) {
            localStorage.removeItem('badmintonState_v8');
            location.reload();
        }
    }
</script>
</body>
</html>
